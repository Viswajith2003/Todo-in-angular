<div class="rooster-editor-wrapper">
  
  <div class="editor-toolbar">
   
    <div class="toolbar-group">
      <button 
        type="button" 
        (click)="execBold()" 
        class="toolbar-btn" 
        title="Bold"
        aria-label="Bold"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
          <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execItalic()" 
        class="toolbar-btn" 
        title="Italic"
        aria-label="Italic"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="4" x2="10" y2="4"></line>
          <line x1="14" y1="20" x2="5" y2="20"></line>
          <line x1="15" y1="4" x2="9" y2="20"></line>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execUnderline()" 
        class="toolbar-btn" 
        title="Underline"
        aria-label="Underline"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path>
          <line x1="4" y1="21" x2="20" y2="21"></line>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execStrikethrough()" 
        class="toolbar-btn" 
        title="Strikethrough"
        aria-label="Strikethrough"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <path d="M16 4H9a4 4 0 0 0-4 4v0a4 4 0 0 0 4 4h6a4 4 0 0 1 4 4v0a4 4 0 0 1-4 4H7"></path>
        </svg>
      </button>
    </div>

    <div class="toolbar-separator"></div>

    
    <div class="toolbar-group">
      <button 
        type="button" 
        (click)="execBullet()" 
        class="toolbar-btn" 
        title="Bullet List"
        aria-label="Bullet List"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execNumbering()" 
        class="toolbar-btn" 
        title="Numbered List"
        aria-label="Numbered List"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="10" y1="6" x2="21" y2="6"></line>
          <line x1="10" y1="12" x2="21" y2="12"></line>
          <line x1="10" y1="18" x2="21" y2="18"></line>
          <path d="M4 6h1v4"></path>
          <path d="M4 10h2"></path>
          <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path>
        </svg>
      </button>
    </div>

    <div class="toolbar-separator"></div>

   
    <div class="toolbar-group">
      <button 
        type="button" 
        (click)="execAlignLeft()" 
        class="toolbar-btn" 
        title="Align Left"
        aria-label="Align Left"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="17" y1="10" x2="3" y2="10"></line>
          <line x1="21" y1="6" x2="3" y2="6"></line>
          <line x1="21" y1="14" x2="3" y2="14"></line>
          <line x1="17" y1="18" x2="3" y2="18"></line>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execAlignCenter()" 
        class="toolbar-btn" 
        title="Align Center"
        aria-label="Align Center"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="10" x2="6" y2="10"></line>
          <line x1="21" y1="6" x2="3" y2="6"></line>
          <line x1="21" y1="14" x2="3" y2="14"></line>
          <line x1="18" y1="18" x2="6" y2="18"></line>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execAlignRight()" 
        class="toolbar-btn" 
        title="Align Right"
        aria-label="Align Right"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="21" y1="10" x2="7" y2="10"></line>
          <line x1="21" y1="6" x2="3" y2="6"></line>
          <line x1="21" y1="14" x2="3" y2="14"></line>
          <line x1="21" y1="18" x2="7" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="toolbar-separator"></div>

    
    <div class="toolbar-group">
      <button 
        type="button" 
        (click)="execClearFormat()" 
        class="toolbar-btn text-purple" 
        title="Clear Formatting"
        aria-label="Clear Formatting"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 20V10"></path>
          <path d="M12 20V4"></path>
          <path d="M6 20v-6"></path>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execUndo()" 
        class="toolbar-btn" 
        title="Undo"
        aria-label="Undo"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7v6h6"></path>
          <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="execRedo()" 
        class="toolbar-btn" 
        title="Redo"
        aria-label="Redo"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 7v6h-6"></path>
          <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path>
        </svg>
      </button>
    </div>

    <div class="toolbar-separator"></div>

    <!-- Media & Table insertion group -->
    <div class="toolbar-group">
      <button 
        type="button" 
        (click)="openImageModal()" 
        class="toolbar-btn text-cyan" 
        title="Insert Image"
        aria-label="Insert Image"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="openVideoModal()" 
        class="toolbar-btn text-cyan" 
        title="Insert Video"
        aria-label="Insert Video"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
      </button>
      <button 
        type="button" 
        (click)="openTableModal()" 
        class="toolbar-btn text-cyan" 
        title="Insert Table"
        aria-label="Insert Table"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"></path>
        </svg>
      </button>
    </div>

    <!-- Table Editing Operations -->
    <div class="toolbar-separator"></div>
    <div class="toolbar-group table-ops-container">
      <button type="button" (click)="execTableOp('insertAbove')" class="table-op-btn" title="Add Row Above">Row ⬆️</button>
      <button type="button" (click)="execTableOp('insertBelow')" class="table-op-btn" title="Add Row Below">Row ⬇️</button>
      <button type="button" (click)="execTableOp('insertLeft')" class="table-op-btn" title="Add Col Left">Col ⬅️</button>
      <button type="button" (click)="execTableOp('insertRight')" class="table-op-btn" title="Add Col Right">Col ➡️</button>
      <button type="button" (click)="execTableOp('deleteRow')" class="table-op-btn danger-hover" title="Delete Row">Del Row</button>
      <button type="button" (click)="execTableOp('deleteColumn')" class="table-op-btn danger-hover" title="Delete Col">Del Col</button>
      <button type="button" (click)="execTableOp('deleteTable')" class="table-op-btn danger-hover" title="Delete Table">Del Tab</button>
    </div>
  </div>

  
  <div class="editor-container-outer">
    <div 
      #editorContainer 
      class="rooster-editor-body" 
      [attr.placeholder]="placeholder"
    ></div>
  </div>

  <!-- Inline Modal Dialog -->
  <div class="editor-modal-overlay" *ngIf="showModal">
    <div class="editor-modal">
      <header class="editor-modal-header">
        <h4>{{ modalTitle }}</h4>
        <button type="button" class="btn-modal-close" (click)="closeModal()">×</button>
      </header>
      <div class="editor-modal-body">
        <ng-container *ngIf="modalType === 'image'">
          <div class="modal-tabs">
            <button 
              type="button" 
              [class.active]="imageSourceType === 'url'" 
              (click)="imageSourceType = 'url'"
              class="modal-tab-btn"
            >
              Image URL
            </button>
            <button 
              type="button" 
              [class.active]="imageSourceType === 'upload'" 
              (click)="imageSourceType = 'upload'"
              class="modal-tab-btn"
            >
              Upload File
            </button>
          </div>

          <div class="modal-form-group" *ngIf="imageSourceType === 'url'" style="margin-top: 0.75rem;">
            <label class="modal-label">{{ modalInputLabel }}</label>
            <input 
              type="text" 
              [(ngModel)]="modalInputValue" 
              placeholder="https://example.com/image.jpg"
              class="modal-input"
              (keyup.enter)="confirmModal()"
            />
          </div>

          <div class="modal-form-group" *ngIf="imageSourceType === 'upload'" style="margin-top: 0.75rem;">
            <label class="modal-label">Choose Image File</label>
            <div class="file-upload-wrapper">
              <input 
                type="file" 
                accept="image/*"
                (change)="onImageFileSelected($event)"
                class="modal-file-input"
                id="editorImageUpload"
              />
              <label for="editorImageUpload" class="file-upload-label">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span>{{ selectedFileName || 'Select image from device...' }}</span>
              </label>
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="modalType === 'video'">
          <div class="modal-tabs">
            <button 
              type="button" 
              [class.active]="videoSourceType === 'url'" 
              (click)="videoSourceType = 'url'"
              class="modal-tab-btn"
            >
              Video URL
            </button>
            <button 
              type="button" 
              [class.active]="videoSourceType === 'upload'" 
              (click)="videoSourceType = 'upload'"
              class="modal-tab-btn"
            >
              Upload File
            </button>
          </div>

          <div class="modal-form-group" *ngIf="videoSourceType === 'url'" style="margin-top: 0.75rem;">
            <label class="modal-label">{{ modalInputLabel }}</label>
            <input 
              type="text" 
              [(ngModel)]="modalInputValue" 
              placeholder="https://example.com/video.mp4"
              class="modal-input"
              (keyup.enter)="confirmModal()"
            />
          </div>

          <div class="modal-form-group" *ngIf="videoSourceType === 'upload'" style="margin-top: 0.75rem;">
            <label class="modal-label">Choose Video File</label>
            <div class="file-upload-wrapper">
              <input 
                type="file" 
                accept="video/*"
                (change)="onVideoFileSelected($event)"
                class="modal-file-input"
                id="editorVideoUpload"
              />
              <label for="editorVideoUpload" class="file-upload-label">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span>{{ selectedVideoName || 'Select video from device...' }}</span>
              </label>
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="modalType === 'table'">
          <div class="modal-form-row">
            <div class="modal-form-group">
              <label class="modal-label">Rows</label>
              <input type="number" [(ngModel)]="modalRows" min="1" max="20" class="modal-input" />
            </div>
            <div class="modal-form-group">
              <label class="modal-label">Columns</label>
              <input type="number" [(ngModel)]="modalCols" min="1" max="20" class="modal-input" />
            </div>
          </div>
        </ng-container>
      </div>
      <footer class="editor-modal-footer">
        <button type="button" class="btn-modal-cancel" (click)="closeModal()">Cancel</button>
        <button type="button" class="btn-modal-confirm" (click)="confirmModal()">Insert</button>
      </footer>
    </div>
  </div>
</div>
